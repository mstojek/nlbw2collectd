name: Build OpenWrt Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          # We build for both a stable and a modern version
          - x86-64-23.05.3  # Produces .ipk
          - x86-64-25.12.2  # Produces .apk
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Build Package
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: nlbw2collectd
          FEED_DIR: ${{ github.workspace }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          # Use a clear name prefix for our artifacts
          name: nlbw2collectd-binaries-${{ matrix.arch }}
          path: bin/packages/**/nlbw2collectd*

  release:
    name: Create GitHub Release
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          # CRITICAL FIX: Only download our packages, ignoring SDK provenance/logs
          pattern: nlbw2collectd-binaries-*
          path: artifacts
          merge-multiple: true

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          # Flat copy of all compiled packages
          find artifacts -name "nlbw2collectd*.ipk" -exec cp {} release-assets/ \;
          find artifacts -name "nlbw2collectd*.apk" -exec cp {} release-assets/ \;
          ls -R release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
