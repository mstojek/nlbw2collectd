name: Build OpenWrt Package (noarch)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86-64-24.10.0
          - x86-64-25.12.2
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Build Package
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: nlbw2collectd
          FEED_DIR: ${{ github.workspace }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: nlbw2collectd-${{ matrix.arch }}
          path: bin/packages/**/nlbw2collectd*

  release:
    name: Create GitHub Release
    needs: build
    if: always() && !cancelled() && contains(needs.build.result, 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.ipk" -exec cp {} release-assets/ \;
          find artifacts -name "*.apk" -exec cp {} release-assets/ \;
          ls -R release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
